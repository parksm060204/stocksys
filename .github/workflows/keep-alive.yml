name: Keep Render Awake

on:
  schedule:
    - cron: "*/5 * * * *" # 매 5분마다 실행
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Service
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
        run: |
          if [ -z "$RENDER_URL" ]; then
            echo "RENDER_URL secret is not set. Skipping ping."
            exit 0
          fi
          echo "Pinging $RENDER_URL ..."
          curl -sSf "$RENDER_URL" > /dev/null || echo "Ping failed but workflow continues."
